name: Playwright Reports
description: Generate and upload Allure and Blob reports
inputs:
  allure_artifact_name:
    description: Artifact name for Allure report
    required: true
  blob_artifact_name:
    description: Artifact name for Blob report
    required: true
runs:
  using: composite
  steps:
    - name: Generate Allure report
      run: npx allure-commandline generate allure-results --clean -o allure-report
      shell: bash
    - name: Upload Allure report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.allure_artifact_name }}
        path: allure-report
        retention-days: 30
        if-no-files-found: warn
    - name: Upload Blob report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ inputs.blob_artifact_name }}
        path: blob-report/
        retention-days: 30
        if-no-files-found: warn
