name: Playwright Common
description: Common setup for Playwright jobs
runs:
  using: composite
  steps:
    - uses: actions/checkout@v4
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 18
    - name: Install dependencies
      run: npm ci
      shell: bash
    - name: Install Playwright Browsers
      run: npx playwright install
      shell: bash
