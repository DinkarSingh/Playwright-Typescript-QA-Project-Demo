name: Playwright Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Playwright common setup
        uses: ./.github/actions/playwright-common
      - name: Run Lint
        run: npm run lint
      - name: Run Format Check
        run: npm run format -- --check

  build:
    runs-on: ubuntu-latest
    needs: tests
    steps:
      - uses: actions/checkout@v4
      - name: Playwright common setup
        uses: ./.github/actions/playwright-common

  api_tests:
    runs-on: ubuntu-latest
    needs: build
    env:
      JUNIT_FILE: playwright-report/api-results.xml
    steps:
      - uses: actions/checkout@v4
      - name: Playwright common setup
        uses: ./.github/actions/playwright-common
      - name: Run API Tests
        run: npx playwright test --project=public-api --workers=1
      - name: Upload Playwright API Report and Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-api-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
      - name: Upload Allure and Blob reports (API)
        if: always()
        uses: ./.github/actions/playwright-reports
        with:
          allure_results_artifact_name: allure-results-api
          blob_artifact_name: blob-report-api

  ui_tests:
    runs-on: ubuntu-latest
    needs: api_tests
    env:
      USER_EMAIL: ${{ secrets.USER_EMAIL }}
      USER_PASSWORD: ${{ secrets.USER_PASSWORD }}
      JUNIT_FILE: playwright-report/ui-results.xml
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      PIPELINE_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
    steps:
      - uses: actions/checkout@v4
      - name: Playwright common setup
        uses: ./.github/actions/playwright-common
      - name: Run UI Tests
        run: npx playwright test --project=default --workers=1
      - name: Upload Playwright UI Report and Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-ui-report
          path: |
            playwright-report/
            test-results/
          retention-days: 30
      - name: Upload Test Results Summary
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-summary
          path: playwright-report/*.xml
      - name: Upload Allure and Blob reports (UI)
        if: always()
        uses: ./.github/actions/playwright-reports
        with:
          allure_results_artifact_name: allure-results-ui
          blob_artifact_name: blob-report-ui

  notify:
    runs-on: ubuntu-latest
    needs: ui_tests
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Playwright common setup
        uses: ./.github/actions/playwright-common
      - name: Download Allure Results (API)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-api
          path: allure-results/api
      - name: Download Allure Results (UI)
        uses: actions/download-artifact@v4
        with:
          name: allure-results-ui
          path: allure-results/ui
      - name: Prepare Allure Results
        run: |
          mkdir -p allure-results
          cp -R allure-results/api/. allure-results/ || true
          cp -R allure-results/ui/. allure-results/ || true
      - name: Generate Allure report (Merged)
        if: always()
        run: npx allure-commandline generate allure-results --clean -o allure-report
      - name: Download Blob Report (API)
        uses: actions/download-artifact@v4
        with:
          name: blob-report-api
          path: blob-report
      - name: Download Blob Report (UI)
        uses: actions/download-artifact@v4
        with:
          name: blob-report-ui
          path: blob-report
      - name: Merge reports and notify Slack
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          PIPELINE_URL: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
          ALLURE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/
        run: npx playwright merge-reports -c playwright.merge.config.ts blob-report
      - name: Upload Allure report to Pages
        if: always()
        uses: actions/upload-pages-artifact@v3
        with:
          path: allure-report

  deploy_pages:
    runs-on: ubuntu-latest
    needs: notify
    if: github.ref == 'refs/heads/main' && always()
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
